set timeout=0
set default=0

# Installer-test ISO: graphical mode + bastion autologin so the
# gui-installer test harness doesn't depend on send_keys timing for
# Bastion's login form. Production aegis.iso never has the
# bastion_autologin flag.

menuentry "Aegis (installer-test)" {
    multiboot2 /boot/aegis.elf boot=graphical quiet bastion_autologin=root
    module2 /boot/rootfs.img
    module2 /boot/esp.img
    boot
}
