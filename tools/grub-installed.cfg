set timeout=3
set default=0

insmod part_gpt
insmod ext2
insmod search
insmod search_fs_file
insmod all_video
insmod gfxterm
insmod png
insmod font

# Load fonts BEFORE search reassigns $root.
# `loadfont` resolves filenames relative to $root. At GRUB startup $root
# points at the ESP (where BOOTX64.EFI lives). Both fonts we care about
# (font.pf2 and unicode.pf2) live on the ESP — neither was copied to the
# ext2 partition. Once `search --set=root /boot/aegis.elf` runs, $root
# becomes the Aegis ext2 partition and `loadfont` can no longer find
# either file, so gfxterm comes up fontless and renders box-drawing
# characters as `@`. Order matters here.
# Hardcoded preferences with `auto` as the fallback. GRUB tries each
# mode in order; `auto` matches whatever the firmware exposes (some
# OVMF builds advertise only 640x480 / 800x600 GOP modes).
set gfxmode=1280x800x32,1024x768x32,800x600x32,auto
# Load fonts unconditionally — `if … then true … fi` doesn't work in
# the BOOTX64.EFI built by grub-mkimage (no `true` builtin → syntax
# error halts the script). `||` and `&&` also fail. Just call loadfont
# twice. Both files are mcopy'd to the ESP (Makefile lines 311 + 314);
# a missing one prints a non-fatal error and the script continues.
loadfont /EFI/BOOT/unicode.pf2
loadfont /EFI/BOOT/font.pf2
terminal_input console
terminal_output gfxterm

# Background image — same problem as the fonts, must be loaded BEFORE
# `search` reassigns $root to the ext2 partition. wallpaper.png is
# mcopy'd to the ESP at /EFI/BOOT/wallpaper.png by the Makefile.
background_image /EFI/BOOT/wallpaper.png

# Locate the Aegis root partition by scanning all disks+partitions for
# /boot/aegis.elf. search --file works regardless of how many disks are
# attached and without needing GRUB's [ ] test command (which isn't
# available in all builds).
search --no-floppy --file --set=root /boot/aegis.elf

menuentry "Aegis (graphical)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=graphical quiet
    boot
}

menuentry "Aegis (text)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text quiet
    boot
}

menuentry "Aegis (debug)" {
    set gfxpayload=keep
    multiboot2 /boot/aegis.elf boot=text
    boot
}
